<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<!-- PWA Core -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4fc3f7" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0288d1" media="(prefers-color-scheme: light)">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152x152.png">

<!-- SEO -->
<meta name="description" content="Velora – Real-time weather, AQI, pollen, UV, astronomy & 20 smart health scores. By Manik Roy.">
<meta name="keywords" content="weather, AQI, air quality, forecast, UV index, pollen, aurora">
<meta name="author" content="Manik Roy">
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--txt:#e8eaf6;--sub:#7986cb;--acc:#4fc3f7;--warn:#ffb74d;--bad:#ef5350;--bdr:rgba(255,255,255,.07);--sh:0 4px 32px rgba(0,0,0,.4);--r:16px;--ft:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;--mono:var(--ft)}
[data-theme="light"]{--bg:#f0f4ff;--card:#fff;--card2:#e8edf8;--txt:#1a1d2e;--sub:#5c6bc0;--acc:#0288d1;--bdr:rgba(0,0,0,.08);--sh:0 4px 24px rgba(0,0,0,.1)}
[data-theme="oled"]{--bg:#000;--card:#0a0a0a;--card2:#111;--txt:#fff;--sub:#7986cb;--bdr:rgba(255,255,255,.05);--sh:0 4px 32px rgba(0,0,0,.8)}
[data-theme="hc"]{--bg:#000;--card:#000;--card2:#111;--txt:#fff;--sub:#ff0;--acc:#0ff;--warn:#f90;--bad:#f00;--bdr:#fff;--sh:none}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:var(--ft);min-height:100vh;transition:background .4s,color .3s;display:flex;flex-direction:column;align-items:center}
#offlineBanner{display:none;position:sticky;top:0;z-index:99;width:100%;background:#ef5350;color:#fff;text-align:center;font-size:.68rem;padding:6px;letter-spacing:1px}
#ptr{text-align:center;font-size:.6rem;color:var(--sub);height:0;overflow:hidden;transition:height .2s}
header{width:100%;max-width:560px;padding:14px 12px 0;display:flex;justify-content:space-between;align-items:center;gap:8px}
.logo{font-size:1.15rem;font-weight:800;color:var(--acc);white-space:nowrap;letter-spacing:-.5px}
.hdr-right{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.themes{display:flex;gap:3px}
.themes button,.tbtn{background:var(--card);border:1px solid var(--bdr);color:var(--txt);font-size:.57rem;font-family:var(--ft);padding:4px 7px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.themes button.active,.themes button:hover,.tbtn:hover{background:var(--acc);color:#000;border-color:var(--acc)}
.tbtn.ua{background:var(--warn);color:#000;border-color:var(--warn)}
main{width:100%;max-width:560px;padding:11px 10px;display:flex;flex-direction:column;gap:9px;flex:1}
.search-wrap{position:relative}
.search-row{display:flex;gap:7px}
.search-row input{flex:1;background:var(--card);border:1px solid var(--bdr);color:var(--txt);font-family:var(--ft);font-size:.88rem;padding:11px 14px;border-radius:var(--r);outline:none;transition:border .2s}
.search-row input::placeholder{color:var(--sub);opacity:.6}
.search-row input:focus{border-color:var(--acc)}
.search-row button{background:var(--acc);color:#000;font-size:.72rem;font-weight:700;border:none;padding:11px 15px;border-radius:var(--r);cursor:pointer;transition:opacity .2s}
#suggestions{position:absolute;top:calc(100% + 4px);left:0;right:50px;background:var(--card);border:1px solid var(--bdr);border-radius:11px;z-index:100;overflow:hidden;box-shadow:var(--sh);display:none}
.sug-item{padding:9px 14px;font-size:.8rem;cursor:pointer;border-bottom:1px solid var(--bdr)}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:var(--card2)}
.favs-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;min-height:0}
.favs-row::-webkit-scrollbar{display:none}
.fav-chip{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:5px 10px;font-size:.62rem;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .2s}
.fav-chip:hover{border-color:var(--acc);color:var(--acc)}
.rm{opacity:.35;font-size:.58rem}
.rm:hover{opacity:1;color:var(--bad)}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;box-shadow:var(--sh);animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hero{text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:var(--hglow,radial-gradient(ellipse at 50% 0%,rgba(79,195,247,.13),transparent 70%));pointer-events:none;transition:background 1.2s}
.city-name{font-size:1.2rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:7px}
.fav-star{cursor:pointer;font-size:.9rem;opacity:.35;transition:all .2s;background:none;border:none;color:inherit;padding:0}
.fav-star.on,.fav-star:hover{opacity:1}
.date-line{font-size:.67rem;color:var(--sub);margin:3px 0 11px}
.temp-big{font-size:3.8rem;font-weight:800;line-height:1;letter-spacing:-3px;color:var(--acc)}
.temp-big sup{font-size:1.6rem;vertical-align:top;margin-top:7px}
.condition{color:var(--sub);margin:5px 0 11px;text-transform:uppercase;letter-spacing:2px;font-size:.64rem}
.stats-row{display:flex;border-top:1px solid var(--bdr);padding-top:11px}
.stat{flex:1;text-align:center;border-right:1px solid var(--bdr)}
.stat:last-child{border-right:none}
.stat-val{font-size:.86rem;font-weight:700}
.stat-lbl{font-size:.54rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sec-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--sub);margin-bottom:9px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.tile{background:var(--card2);border-radius:12px;padding:10px 8px;text-align:center}
.tile-ico{font-size:1.25rem;margin-bottom:3px}
.tile-val{font-size:.86rem;font-weight:700;line-height:1.2}
.tile-lbl{font-size:.54rem;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-top:3px}
.tile-bar{height:5px;border-radius:3px;margin-top:6px;overflow:hidden;background:var(--bdr)}
.tile-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.6rem;font-weight:700;margin-top:4px}
.tip-card{background:var(--card);border:1px solid var(--bdr);border-left:3px solid var(--acc);border-radius:var(--r);padding:11px 13px;font-size:.74rem;line-height:1.65;color:var(--sub);animation:fadeUp .35s ease both}
.tip-card strong{color:var(--txt);display:block;margin-bottom:4px;font-size:.66rem;text-transform:uppercase;letter-spacing:1px}
.alert-card{border-left-color:var(--bad) !important}
.aqi-bar{margin-top:11px;height:8px;border-radius:5px;overflow:hidden;background:linear-gradient(to right,#81c784,#aed581,#ffee58,#ffb74d,#ef5350,#7b1fa2)}
.aqi-cur-wrap{position:relative;height:13px}
.aqi-cur{position:absolute;top:1px;width:3px;height:10px;border-radius:2px;background:var(--txt);transition:left .6s cubic-bezier(.34,1.56,.64,1)}
.aqi-leg{display:flex;justify-content:space-between;font-size:.52rem;color:var(--sub)}
.polls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.poll{background:var(--card2);border-radius:9px;padding:7px;text-align:center}
.poll-v{font-size:.8rem;font-weight:700}
.poll-n{font-size:.52rem;color:var(--sub);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.uv-track{height:5px;border-radius:3px;background:linear-gradient(to right,#81c784,#ffee58,#ffb74d,#ef5350,#7b1fa2);margin-top:5px;position:relative;overflow:hidden}
.uv-mask{height:100%;background:rgba(0,0,0,.45);position:absolute;right:0;top:0;transition:width .6s}
.hourly-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hourly-scroll::-webkit-scrollbar{display:none}
.hcard{background:var(--card2);border:1px solid var(--bdr);border-radius:10px;padding:8px 9px;text-align:center;min-width:54px;flex-shrink:0}
.ht{font-size:.54rem;color:var(--sub);margin-bottom:3px}
.hi{font-size:1.15rem;line-height:1.2}
.hte{font-size:.76rem;font-weight:700;margin-top:3px}
.hr{font-size:.52rem;color:var(--acc);margin-top:2px}
.fc-list{display:flex;flex-direction:column;gap:6px}
.fc{background:var(--card2);border-radius:10px;padding:8px 11px;display:flex;align-items:center;justify-content:space-between}
.fc-day{font-size:.74rem;font-weight:700;width:76px}
.fc-ico{font-size:1.1rem;flex:1;text-align:center}
.fc-rain{font-size:.57rem;color:var(--acc);flex:1;text-align:center}
.fc-rng{font-size:.74rem;display:flex;gap:7px}
.fc-hi{font-weight:700}
.fc-lo{color:var(--sub)}
.updated{text-align:center;font-size:.57rem;color:var(--sub);padding:2px 0}
.msg{text-align:center;padding:36px 16px;color:var(--sub);font-size:.8rem;animation:fadeUp .4s ease}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.moon-phase{font-size:1.8rem;line-height:1}
footer{width:100%;max-width:560px;text-align:center;padding:13px 12px 20px;font-size:.63rem;color:var(--sub);border-top:1px solid var(--bdr);margin-top:6px}
footer strong{color:var(--acc)}
</style>
</head>
<body>
<div id="offlineBanner">⚡ OFFLINE — SHOWING CACHED DATA</div>
<div id="ptr">↓ Release to refresh</div>
<header>
  <div class="logo"> Velora</div>
  <div class="hdr-right">
    <button class="tbtn" id="unitBtn" onclick="toggleUnit()">°C</button>
    <button class="tbtn" onclick="doRefresh()">↻</button>
    <div class="themes">
      <button onclick="setTheme('dark')" id="t-dark">DARK</button>
      <button onclick="setTheme('light')" id="t-light">LITE</button>
      <button onclick="setTheme('oled')" id="t-oled">OLED</button>
      <button onclick="setTheme('hc')" id="t-hc">HC</button>
    </div>
  </div>
</header>
<main>
  <div class="search-wrap">
    <div class="search-row">
      <input id="cityInput" type="text" placeholder="Search city…" autocomplete="off" oninput="onInput(this.value)" onkeydown="onKey(event)">
      <button onclick="fetchWeather()">GO</button>
    </div>
    <div id="suggestions"></div>
  </div>
  <div id="favsRow" class="favs-row"></div>
  <div id="output"><div class="msg"><div class="spinner"></div><br>Loading weather…</div></div>
  <div id="updLine" class="updated"></div>
</main>
<footer>© <strong>Manik Roy</strong> <span id="yr"></span> · All Rights Reserved</footer>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
const THEMES=['dark','light','oled','hc'];
function setTheme(t){document.documentElement.setAttribute('data-theme',t);THEMES.forEach(x=>document.getElementById('t-'+x).classList.remove('active'));document.getElementById('t-'+t).classList.add('active');localStorage.setItem('wtheme',t)}
setTheme(localStorage.getItem('wtheme')||'dark');

let useF=localStorage.getItem('wunit')==='F',lastData=null;
const toF=c=>Math.round(c*9/5+32);
const fmtT=c=>useF?`${toF(c)}°F`:`${Math.round(c)}°C`;
const fmtTs=c=>useF?`${toF(c)}°`:`${Math.round(c)}°`;
function toggleUnit(){useF=!useF;localStorage.setItem('wunit',useF?'F':'C');const b=document.getElementById('unitBtn');b.textContent=useF?'°F':'°C';b.classList.toggle('ua',useF);if(lastData)render(...lastData);}
if(useF){document.getElementById('unitBtn').textContent='°F';document.getElementById('unitBtn').classList.add('ua');}

function chkOnline(){document.getElementById('offlineBanner').style.display=navigator.onLine?'none':'block';}
window.addEventListener('online',chkOnline);window.addEventListener('offline',chkOnline);chkOnline();

let ptY=0;
document.addEventListener('touchstart',e=>{if(window.scrollY===0)ptY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{if(ptY&&e.touches[0].clientY-ptY>55)document.getElementById('ptr').style.height='26px';},{passive:true});
document.addEventListener('touchend',e=>{if(ptY&&e.changedTouches[0].clientY-ptY>55)doRefresh();ptY=0;document.getElementById('ptr').style.height='0';});
function doRefresh(){fetchWeather(document.getElementById('cityInput').value.trim()||undefined);}

function getFavs(){try{return JSON.parse(localStorage.getItem('wfavs')||'[]');}catch{return[];}}
function saveFavs(f){localStorage.setItem('wfavs',JSON.stringify(f));}
function renderFavs(){const f=getFavs(),r=document.getElementById('favsRow');r.innerHTML=f.length?f.map(c=>`<div class="fav-chip" onclick="loadFav('${esc(c)}')">⭐ ${c} <span class="rm" onclick="event.stopPropagation();removeFav('${esc(c)}')">✕</span></div>`).join(''):'';}
function esc(s){return s.replace(/'/g,"&#39;");}
function addFav(c){const f=getFavs();if(!f.includes(c)){f.unshift(c);if(f.length>8)f.pop();saveFavs(f);renderFavs();}}
function removeFav(c){saveFavs(getFavs().filter(x=>x!==c));renderFavs();}
function loadFav(c){document.getElementById('cityInput').value=c;fetchWeather(c);}
function toggleFav(c){getFavs().includes(c)?removeFav(c):addFav(c);renderFavs();updStar(c);}
function updStar(c){const b=document.getElementById('starBtn');if(b){const on=getFavs().includes(c);b.textContent=on?'⭐':'☆';b.className='fav-star'+(on?' on':'');}}
renderFavs();

let sugT=null;
async function onInput(v){clearTimeout(sugT);document.getElementById('suggestions').style.display='none';if(v.length<2)return;sugT=setTimeout(async()=>{try{const d=await fetchT(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=5`);const box=document.getElementById('suggestions');if(!d.results?.length){box.style.display='none';return;}box.innerHTML=d.results.map(r=>`<div class="sug-item" onclick="selSug('${esc(r.name+', '+r.country_code)}')">${r.name}, ${r.admin1||''}, ${r.country_code}</div>`).join('');box.style.display='block';}catch{}},340);}
function selSug(v){document.getElementById('cityInput').value=v;document.getElementById('suggestions').style.display='none';fetchWeather(v);}
function onKey(e){if(e.key==='Enter'){document.getElementById('suggestions').style.display='none';fetchWeather();}if(e.key==='Escape')document.getElementById('suggestions').style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('suggestions').style.display='none';});

const WI={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌨️',71:'❄️',73:'❄️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',85:'❄️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WD={0:'Clear',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Showers',81:'Heavy Showers',82:'Violent Showers',85:'Snow Showers',86:'Heavy Snow Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};

function aqiInfo(v){if(v<=50)return{l:'Good',c:'#81c784'};if(v<=100)return{l:'Moderate',c:'#ffee58'};if(v<=150)return{l:'Unhealthy·Sensitive',c:'#ffb74d'};if(v<=200)return{l:'Unhealthy',c:'#ef5350'};if(v<=300)return{l:'Very Unhealthy',c:'#ab47bc'};return{l:'Hazardous',c:'#7b1fa2'};}
function uvLbl(v){return v<=2?'Low':v<=5?'Moderate':v<=7?'High':v<=10?'Very High':'Extreme';}
function windDir(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]||'–';}
function pct(v,mx=500){return Math.min(100,Math.max(0,v/mx*100));}
function fmtTime(iso){if(!iso)return'–';const d=new Date(iso),h=d.getHours()%12||12,m=String(d.getMinutes()).padStart(2,'0'),a=d.getHours()>=12?'PM':'AM';return`${h}:${m} ${a}`;}
function hrLbl(iso){const d=new Date(iso),h=d.getHours()%12||12,a=d.getHours()>=12?'PM':'AM';return h+a;}
function dayLbl(iso,i){if(i===0)return'Today';if(i===1)return'Tomorrow';return new Date(iso).toLocaleDateString('en',{weekday:'short'});}

// ── COMPUTED INDICES ─────────────────────────────────────────────────
// 1. Pollen (estimated from temp+wind+humidity)
function pollenScore(temp,hum,wind,code){if([61,63,65,80,81,95,96,99].includes(code))return{s:0,l:'None',c:'#81c784'};const s=Math.round(Math.max(0,Math.min(10,(temp-5)*.3+(50-hum)*.05+wind*.02)));if(s<=2)return{s,l:'Low',c:'#81c784'};if(s<=5)return{s,l:'Moderate',c:'#ffee58'};if(s<=8)return{s,l:'High',c:'#ffb74d'};return{s,l:'Very High',c:'#ef5350'};}
// 2. Heat stroke risk
function heatRisk(temp,hum,uv){const hi=temp+(0.33*hum/100*6.105*Math.exp(17.27*temp/(237.7+temp)))-4;const r=Math.round(Math.max(0,Math.min(10,(hi-25)*.3+uv*.2)));if(r<=2)return{r,l:'Low',c:'#81c784'};if(r<=5)return{r,l:'Moderate',c:'#ffee58'};if(r<=7)return{r,l:'High',c:'#ffb74d'};return{r,l:'Extreme',c:'#ef5350'};}
// 3. Sleep quality (ideal: 16-19°C night temp, humidity 40-60%)
function sleepScore(minTemp,hum){const ts=10-Math.abs(minTemp-17.5)*0.8;const hs=10-Math.abs(hum-50)*.1;const s=Math.round(Math.max(1,Math.min(10,(ts+hs)/2)));return{s,l:s>=8?'Excellent':s>=6?'Good':s>=4?'Fair':'Poor',c:s>=8?'#81c784':s>=6?'#4fc3f7':s>=4?'#ffb74d':'#ef5350'};}
// 4. Arthritis index (cold + pressure drops = pain)
function arthritisIdx(temp,pressure){const s=Math.round(Math.max(0,Math.min(10,(20-temp)*.25+(1020-pressure)*.05)));if(s<=2)return{s,l:'Low',c:'#81c784'};if(s<=5)return{s,l:'Moderate',c:'#ffee58'};if(s<=7)return{s,l:'High',c:'#ffb74d'};return{s,l:'Very High',c:'#ef5350'};}
// 5. Running/cycling score
function activityScore(temp,wind,aqi,rain,uv){let s=10;s-=Math.abs(temp-18)*.2;s-=wind*.05;s-=aqi/50;s-=rain*.05;s-=Math.max(0,uv-6)*.3;s=Math.round(Math.max(0,Math.min(10,s)));return{s,l:s>=8?'Excellent':s>=6?'Good':s>=4?'Fair':'Poor',c:s>=8?'#81c784':s>=6?'#4fc3f7':s>=4?'#ffb74d':'#ef5350'};}
// 6. Stargazing score
function stargazeScore(cloudPct,moonPct){const s=Math.round(Math.max(0,Math.min(10,(100-cloudPct)*.07+(100-moonPct)*.03)));return{s,l:s>=8?'Perfect':s>=6?'Good':s>=4?'Fair':'Poor',c:s>=8?'#81c784':s>=6?'#4fc3f7':s>=4?'#ffb74d':'#ef5350'};}
// 7. Moon phase
function moonPhase(){const d=new Date(),jd=Math.floor(d/86400000)+2440587.5;const phase=((jd-2451550.1)/29.530588)%1;const p=phase<0?phase+1:phase;const pct=Math.round(p*100);const emoji=p<.0625?'🌑':p<.1875?'🌒':p<.3125?'🌓':p<.4375?'🌔':p<.5625?'🌕':p<.6875?'🌖':p<.8125?'🌗':p<.9375?'🌘':'🌑';const name=p<.0625?'New Moon':p<.1875?'Waxing Crescent':p<.3125?'First Quarter':p<.4375?'Waxing Gibbous':p<.5625?'Full Moon':p<.6875?'Waning Gibbous':p<.8125?'Last Quarter':p<.9375?'Waning Crescent':'New Moon';return{emoji,name,pct};}
// 8. Aurora probability (uses lat as proxy for Kp threshold)
function auroraProb(lat){const kpNeeded=lat>65?2:lat>60?3:lat>55?5:lat>50?7:10;const kpEst=Math.random()*6+1;const p=Math.max(0,Math.min(100,Math.round((6-kpNeeded+kpEst)*15)));return{p,l:p>70?'High':p>40?'Moderate':p>15?'Low':'Very Low',c:p>70?'#81c784':p>40?'#4fc3f7':p>15?'#ffb74d':'#ef5350'};}
// 9. Golden hour & blue hour
function goldenBlueTimes(sunriseISO,sunsetISO){const sr=new Date(sunriseISO),ss=new Date(sunsetISO);const fmt=d=>{const h=d.getHours()%12||12,m=String(d.getMinutes()).padStart(2,'0'),a=d.getHours()>=12?'PM':'AM';return`${h}:${m} ${a}`;};const mornBlue=new Date(sr-25*60000),mornGold=new Date(sr+5*60000),mornGoldEnd=new Date(sr+65*60000);const eveGold=new Date(ss-60*60000),eveGoldEnd=new Date(ss+5*60000),eveBlueEnd=new Date(ss+25*60000);return{mornBlue:fmt(mornBlue),mornGold:`${fmt(mornGold)}–${fmt(mornGoldEnd)}`,eveGold:`${fmt(eveGold)}–${fmt(eveGoldEnd)}`,eveBlue:`${fmt(eveGoldEnd)}–${fmt(eveBlueEnd)}`};}
// 10. Best day this week
function bestDay(daily){let best=0,bestScore=-Infinity;daily.time.forEach((_,i)=>{const s=daily.temperature_2m_max[i]-(daily.precipitation_probability_max?.[i]??50)*.5+(10-Math.min(10,daily.uv_index_max?.[i]??5)*.5);if(s>bestScore){bestScore=s;best=i;}});return best;}
// 11. Weather anomaly (vs avg based on season)
function tempAnomaly(temp,lat){const month=new Date().getMonth();const seasonal=[5,6,8,12,16,20,22,22,18,14,9,6];const avg=seasonal[month]+(lat>0?0:-seasonal[month]*2+seasonal[(month+6)%12]);const diff=Math.round(temp-avg);return{diff,l:diff>3?`${diff}° warmer than usual`:diff<-3?`${Math.abs(diff)}° colder than usual`:'Near seasonal average',c:diff>3?'#ef5350':diff<-3?'#4fc3f7':'#81c784'};}
// 12. Commute windows (7-9am, 5-7pm)
function commuteWeather(hourly,now){const get=targetH=>{const idx=hourly.time.findIndex(t=>{const d=new Date(t);return d.getDate()===now.getDate()&&d.getHours()===targetH;});if(idx<0)return null;return{rain:hourly.precipitation_probability?.[idx]??0,temp:hourly.temperature_2m?.[idx]??0,code:hourly.weather_code?.[idx]??0};};return{morning:get(8),evening:get(18)};}
// 13. Laundry drying index
function laundryIdx(wind,hum,code,uv){if([61,63,65,80,81,82,95,96,99,71,73,75].includes(code))return{s:0,l:'Not Today',c:'#ef5350'};const s=Math.round(Math.max(0,Math.min(10,wind*.15+(100-hum)*.06+uv*.2)));return{s,l:s>=8?'Excellent':s>=5?'Good':s>=3?'Fair':'Poor',c:s>=8?'#81c784':s>=5?'#4fc3f7':s>=3?'#ffb74d':'#ef5350'};}
// 14. Car frost warning

// 19. Flood risk
function floodRisk(precip,rain7d){const r=Math.min(10,precip*.5+(rain7d||precip*3)*.02);const s=Math.round(r);return{s,l:s<=2?'Low':s<=5?'Moderate':s<=7?'High':'Severe',c:s<=2?'#81c784':s<=5?'#ffee58':s<=7?'#ffb74d':'#ef5350'};}

function setBg(code,isDay){const g={0:isDay?'rgba(255,200,50,.17)':'rgba(10,20,70,.5)',1:isDay?'rgba(200,230,255,.14)':'rgba(20,30,70,.4)',2:'rgba(150,170,210,.12)',3:'rgba(100,110,130,.14)',61:'rgba(50,100,200,.15)',80:'rgba(50,120,220,.15)',95:'rgba(60,30,100,.22)'};const c=g[code]||g[2];document.documentElement.style.setProperty('--hglow',`radial-gradient(ellipse at 50% 0%,${c},transparent 70%)`);}

function fetchT(url,ms=8000){const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(t)).then(r=>r.json());}

function gpsLocation(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej(new Error('No GPS'));navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),rej,{timeout:8000,maximumAge:60000});});}

async function fetchWeather(cityOverride){
  const city=cityOverride||document.getElementById('cityInput').value.trim();
  setOut('<div class="msg"><div class="spinner"></div><br>Fetching weather…</div>');
  document.getElementById('updLine').textContent='';
  try{
    let lat,lon,name;
    if(city){const geo=await fetchT(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);if(!geo.results?.length)throw new Error('City not found.');lat=geo.results[0].latitude;lon=geo.results[0].longitude;name=`${geo.results[0].name}, ${geo.results[0].country_code}`;}
    else{const loc=await ipLocation();lat=loc.lat;lon=loc.lon;name=loc.name;}
    const wurl=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,weather_code,apparent_temperature,precipitation,surface_pressure,visibility,dew_point_2m,uv_index,is_day&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max,uv_index_max,precipitation_sum&timezone=auto&forecast_days=7&wind_speed_unit=kmh`;
    const aurl=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi,pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,ozone&timezone=auto`;
    const [wd,ad]=await Promise.all([fetchT(wurl),fetchT(aurl)]);
    try{localStorage.setItem('wcache',JSON.stringify({name,lat,wd,ad,ts:Date.now()}));}catch{}
    lastData=[name,lat,wd,ad];render(name,lat,wd,ad);
    document.getElementById('updLine').textContent=`↻ Updated ${new Date().toLocaleTimeString()}`;
    updStar(name);
  }catch(e){
    try{const c=JSON.parse(localStorage.getItem('wcache')||'{}');if(c.wd){lastData=[c.name,c.lat,c.wd,c.ad];render(c.name,c.lat,c.wd,c.ad);document.getElementById('updLine').textContent=`Cached · ${new Date(c.ts).toLocaleTimeString()}`;return;}}catch{}
    setOut(`<div class="msg">⚠️ ${e.message||'Network error'}<br><small style="opacity:.6">Search a city or check connection.</small><br><br><button onclick="useGPS()" style="margin-top:8px;background:var(--acc);color:#000;border:none;padding:8px 18px;border-radius:20px;font-size:.7rem;cursor:pointer">📍 Use GPS</button></div>`);
  }
}

        <div class="tile"><div class="tile-ico">🌅</div><div class="tile-val">${rise}</div><div class="tile-lbl">Sunrise</div></div>
        <div class="tile"><div class="tile-ico">🌇</div><div class="tile-val">${set}</div><div class="tile-lbl">Sunset</div></div>
        <div class="tile"><div class="tile-ico">🔆</div><div class="tile-val">${uv.toFixed(1)} <small style="font-size:.6rem;opacity:.7">${uvLbl(uv)}</small></div><div class="tile-lbl">UV Index</div><div class="uv-track"><div class="uv-mask" style="width:${100-uvPct}%"></div></div></div>
      </div>
    </div>

    <div class="card" style="animation-delay:.22s">
      <div class="sec-lbl">Atmospheric Details</div>
      <div class="g3">
        <div class="tile"><div class="tile-val">${vis} km</div><div class="tile-lbl">Visibility</div></div>
        <div class="tile"><div class="tile-val">${fmtT(dew)}</div><div class="tile-lbl">Dew Point</div></div>
        <div class="tile"><div class="tile-val">${pressure} hPa</div><div class="tile-lbl">Pressure</div></div>
        <div class="tile"><div class="tile-val">${wdir} ${c.wind_direction_10m??0}°</div><div class="tile-lbl">Wind Dir.</div></div>
        <div class="tile"><div class="tile-val">${Math.round(c.wind_speed_10m)} km/h</div><div class="tile-lbl">Wind Speed</div></div>
        <div class="tile"><div class="tile-val">${lat.toFixed(2)}°</div><div class="tile-lbl">Latitude</div></div>
      </div>
    </div>

    <div class="card" style="animation-delay:.25s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--sub);margin-bottom:4px">Air Quality Index</div><div style="font-size:2rem;font-weight:800;color:${ai.c};line-height:1">${aqi}</div><div style="font-size:.74rem;font-weight:700;color:${ai.c};margin-top:2px">${ai.l}</div></div>
        <span style="font-size:.6rem;color:var(--sub)">US AQI</span>
      </div>
      <div class="aqi-bar"></div>
      <div class="aqi-cur-wrap"><div class="aqi-cur" style="left:${pct(aqi)}%"></div></div>
      <div class="aqi-leg"><span>Good</span><span>Moderate</span><span>Unhealthy</span><span>Hazardous</span></div>
      <div class="polls">
        <div class="poll"><div class="poll-v">${pm25.toFixed(1)}</div><div class="poll-n">PM2.5</div></div>
        <div class="poll"><div class="poll-v">${pm10.toFixed(1)}</div><div class="poll-n">PM10</div></div>
        <div class="poll"><div class="poll-v">${co}</div><div class="poll-n">CO mg/m³</div></div>
        <div class="poll"><div class="poll-v">${no2}</div><div class="poll-n">NO₂</div></div>
        <div class="poll"><div class="poll-v">${o3}</div><div class="poll-n">O₃</div></div>
        <div class="poll"><div class="poll-v">${pressure}</div><div class="poll-n">hPa</div></div>
      </div>
    </div>

    <div class="card" style="animation-delay:.28s">
      <div class="sec-lbl">Hourly · next 12h</div>
      <div class="hourly-scroll">${hourlyHTML}</div>
    </div>

    <div class="card" style="animation-delay:.31s">
      <div class="sec-lbl">7-Day Forecast · ⭐ Best Day</div>
      <div class="fc-list">${fcHTML}</div>
    </div>
  `);
}
function setOut(h){document.getElementById('output').innerHTML=h;}
fetchWeather();
</script>
</body>
</html>
<script>
// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('[Velora] SW registered:',r.scope))
      .catch(e=>console.warn('[Velora] SW failed:',e));
  });
}
// Install prompt (Add to Home Screen)
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const btn=document.createElement('button');
  btn.className='tbtn';btn.textContent='📲 Install';
  btn.style.cssText='background:#81c784;color:#000;border-color:#81c784';
  btn.onclick=()=>{deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;btn.remove();});};
  document.querySelector('.hdr-right').prepend(btn);
});
</script>
